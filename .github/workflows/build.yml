name: Rebuild tracker daily

on:
  schedule:
    # Runs at 07:00 UTC Monday–Friday (8am BST / 7am GMT)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    # Also allows you to trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install simple-salesforce

      - name: Run build script
        env:
          SF_USERNAME:       ${{ secrets.SF_USERNAME }}
          SF_PASSWORD:       ${{ secrets.SF_PASSWORD }}
          SF_TOKEN:          ${{ secrets.SF_TOKEN }}
          SF_CONSUMER_KEY:   ${{ secrets.SF_CONSUMER_KEY }}
          SF_CONSUMER_SECRET: ${{ secrets.SF_CONSUMER_SECRET }}
        run: python build.py

      - name: Commit and push the rebuilt HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Auto-rebuild $(date +%Y-%m-%d\ %H:%M)"
          git push
